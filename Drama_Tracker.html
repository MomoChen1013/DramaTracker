<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FBF7F0">
<title>追劇手帳 · drama log</title>
<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS — 奶油手帳 cream journal
   ════════════════════════════════════════════ */
:root {
  /* surface — 奶油色階 */
  --bg: #FBF7F0;
  --bg-tint: #F7F1E6;
  --surface: #FFFFFF;
  --surface-warm: #FDF9F2;
  --surface-tinted: #F2EADD;
  --paper-shadow: 0 1px 0 rgba(120, 95, 65, 0.04), 0 2px 8px rgba(120, 95, 65, 0.06);
  --paper-shadow-lift: 0 2px 0 rgba(120, 95, 65, 0.05), 0 8px 20px rgba(120, 95, 65, 0.10);

  /* ink — 文字色階 */
  --ink: #3A2E26;
  --ink-soft: #5C4C40;
  --ink-mute: #8B7868;
  --ink-faint: #B8A893;
  --ink-ghost: #DCCFB9;

  /* lines */
  --line: rgba(120, 95, 65, 0.10);
  --line-soft: rgba(120, 95, 65, 0.06);
  --line-strong: rgba(120, 95, 65, 0.22);

  /* accent — 主題色 */
  --accent: #C97B4F;          /* 焦糖橘 */
  --accent-soft: #F5E2D2;
  --accent-deep: #A85F38;

  /* type colors — 飽和但溫和 */
  --c-jp: #D45A6B;            /* 櫻桃紅 */
  --c-jp-bg: #FBE5E8;
  --c-kr: #5A8FB8;            /* 霧霾藍 */
  --c-kr-bg: #E1ECF5;
  --c-cn: #B89146;            /* 焦糖金 */
  --c-cn-bg: #F5EAD3;
  --c-anime: #8868B0;         /* 薰衣草 */
  --c-anime-bg: #EDE4F5;

  /* status colors */
  --s-want: #B89146;          /* 待看 — 焦糖 */
  --s-want-bg: #F5EAD3;
  --s-watching: #5A8FB8;      /* 觀看中 — 藍 */
  --s-watching-bg: #E1ECF5;
  --s-done: #6B9B6B;          /* 已看完 — 抹茶 */
  --s-done-bg: #DEEBDE;
  --s-drop: #A88B7E;          /* 棄劇 — 灰棕 */
  --s-drop-bg: #EDE4DE;

  /* star */
  --star: #E5A04A;
  --star-soft: #F5DDB8;

  /* fonts */
  --serif: "Noto Serif TC", "Songti TC", "STSong", "PingFang TC", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", "Hiragino Sans", sans-serif;
  --num: "SF Pro Display", "Helvetica Neue", -apple-system, sans-serif;

  /* radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-pill: 999px;

  /* easing */
  --ease: cubic-bezier(.32, .72, .35, 1);
  --ease-bounce: cubic-bezier(.34, 1.56, .54, 1);
}

/* ════════════════════════════════════════════
   RESET & BASE
   ════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  /* 紙紋 — 極淡的點狀紋理 */
  background-image:
    radial-gradient(circle at 25% 35%, rgba(180, 150, 110, 0.025) 1px, transparent 1.2px),
    radial-gradient(circle at 75% 65%, rgba(180, 150, 110, 0.025) 1px, transparent 1.2px);
  background-size: 28px 28px, 32px 32px;
  background-position: 0 0, 14px 16px;
  font-feature-settings: "ss01", "cv11";
}
button, input, textarea, select {
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  border: none;
  background: none;
  color: inherit;
}
button { cursor: pointer; }
input, textarea, select { color: var(--ink); }

/* ════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════ */
.app-header {
  background: rgba(251, 247, 240, 0.92);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  border-bottom: 1px solid var(--line);
  padding: 18px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 14px;
}
.app-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.06em;
  line-height: 1.1;
}
.app-title small {
  display: block;
  font-size: 9.5px;
  color: var(--ink-faint);
  letter-spacing: 0.28em;
  margin-top: 4px;
  font-family: var(--sans);
  font-weight: 400;
  text-transform: uppercase;
}
.add-btn {
  background: var(--ink);
  color: var(--surface);
  padding: 0 16px;
  height: 40px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
  box-shadow: 0 2px 0 rgba(58, 46, 38, 0.15), 0 4px 10px rgba(58, 46, 38, 0.18);
}
.add-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(58, 46, 38, 0.15); }
.add-btn .plus { font-size: 16px; line-height: 1; font-weight: 400; }

.tabs {
  display: flex;
  gap: 2px;
  position: relative;
}
.tab-btn {
  flex: 1;
  position: relative;
  color: var(--ink-faint);
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 12px 4px 14px;
  transition: color 0.2s var(--ease);
  min-height: 44px;
}
.tab-btn.active { color: var(--ink); }
.tab-btn::after {
  content: "";
  position: absolute;
  bottom: -1px;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--ink);
  border-radius: 2px;
  transform: translateX(-50%);
  transition: width 0.28s var(--ease);
}
.tab-btn.active::after { width: 32px; }

/* ════════════════════════════════════════════
   MAIN
   ════════════════════════════════════════════ */
.main { padding: 20px 18px 120px; }

/* ── view transition ── */
.view {
  animation: viewIn 0.36s var(--ease);
}
@keyframes viewIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ════════════════════════════════════════════
   STATS — 統計貼紙
   ════════════════════════════════════════════ */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.stat-cell {
  background: var(--surface);
  padding: 12px 6px 11px;
  text-align: center;
  border-radius: var(--r);
  box-shadow: var(--paper-shadow);
  position: relative;
  overflow: hidden;
}
.stat-cell::before {
  content: "";
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 3px;
}
.stat-cell.s-want::before { background: var(--s-want); }
.stat-cell.s-watching::before { background: var(--s-watching); }
.stat-cell.s-done::before { background: var(--s-done); }
.stat-cell.s-drop::before { background: var(--s-drop); }
.stat-num {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}
.stat-lbl {
  font-size: 10px;
  color: var(--ink-mute);
  margin-top: 5px;
  letter-spacing: 0.08em;
  font-weight: 500;
}

/* ════════════════════════════════════════════
   SEARCH + FILTER (合併)
   ════════════════════════════════════════════ */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  font-size: 14px;
  padding: 12px 40px 12px 38px;
  outline: none;
  color: var(--ink);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.search-input:focus {
  border-color: var(--ink-faint);
  box-shadow: 0 0 0 3px rgba(120, 95, 65, 0.07);
}
.search-input::placeholder { color: var(--ink-faint); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-faint);
  pointer-events: none;
  width: 16px;
  height: 16px;
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--ink-mute);
  background: var(--surface-tinted);
  font-size: 14px;
}
.search-clear.show { display: flex; }

.filter-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 2px 2px 8px;
  margin-bottom: 14px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 7px 13px;
  border-radius: var(--r-pill);
  background: var(--surface);
  color: var(--ink-soft);
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  white-space: nowrap;
  min-height: 32px;
  border: 1px solid var(--line);
  transition: all 0.2s var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.filter-chip.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.filter-chip .chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.filter-divider {
  width: 1px;
  background: var(--line-strong);
  margin: 6px 4px;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════
   ENTRY CARDS — 手帳貼紙風
   ════════════════════════════════════════════ */
.entry-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.entry-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
  box-shadow: var(--paper-shadow);
  transition: transform 0.18s var(--ease), box-shadow 0.22s var(--ease);
  animation: cardIn 0.4s var(--ease) backwards;
}
.entry-card:active {
  transform: scale(0.985);
  box-shadow: 0 1px 0 rgba(120, 95, 65, 0.04);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-layout {
  display: flex;
  align-items: stretch;
}
.card-poster {
  width: 64px;
  flex-shrink: 0;
  background: var(--surface-tinted);
  position: relative;
  overflow: hidden;
}
.card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-poster-ph {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink-ghost);
  background: linear-gradient(135deg, var(--surface-tinted), var(--surface-warm));
}
.card-body {
  flex: 1;
  padding: 12px 14px 12px 13px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.card-row1 {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-title {
  font-family: var(--serif);
  font-size: 15.5px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
  letter-spacing: 0.02em;
  flex: 1;
  /* clamp 2 lines */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-status-pill {
  flex-shrink: 0;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  letter-spacing: 0.04em;
  font-weight: 600;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-top: 2px;
}
.card-status-pill.want { background: var(--s-want-bg); color: var(--s-want); }
.card-status-pill.watching { background: var(--s-watching-bg); color: var(--s-watching); }
.card-status-pill.done { background: var(--s-done-bg); color: var(--s-done); }
.card-status-pill.drop { background: var(--s-drop-bg); color: var(--s-drop); }

.card-row2 {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  letter-spacing: 0.04em;
  font-weight: 600;
}
.card-tag.jp { background: var(--c-jp-bg); color: var(--c-jp); }
.card-tag.kr { background: var(--c-kr-bg); color: var(--c-kr); }
.card-tag.cn { background: var(--c-cn-bg); color: var(--c-cn); }
.card-tag.anime { background: var(--c-anime-bg); color: var(--c-anime); }

.card-stars {
  display: inline-flex;
  gap: 1px;
  font-size: 11px;
  letter-spacing: 0;
}
.card-stars .s { color: var(--star-soft); }
.card-stars .s.lit { color: var(--star); }

.card-date {
  font-size: 10.5px;
  color: var(--ink-faint);
  letter-spacing: 0.03em;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
  font-family: var(--num);
}
.card-note {
  font-size: 12.5px;
  color: var(--ink-mute);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  padding-left: 8px;
  border-left: 2px solid var(--line);
  margin-top: 2px;
}

/* ════════════════════════════════════════════
   EMPTY STATE
   ════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 60px 24px 40px;
  animation: viewIn 0.4s var(--ease);
}
.empty-illu {
  width: 96px;
  height: 96px;
  margin: 0 auto 18px;
  position: relative;
}
.empty-illu svg { width: 100%; height: 100%; }
.empty-title {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink-soft);
  letter-spacing: 0.06em;
  margin-bottom: 6px;
  font-weight: 500;
}
.empty-sub {
  font-size: 13px;
  color: var(--ink-faint);
  line-height: 1.6;
}
.empty-cta {
  margin-top: 18px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--ink);
  color: var(--surface);
  padding: 10px 18px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
}

/* ════════════════════════════════════════════
   CALENDAR — 完全重做
   ════════════════════════════════════════════ */
.cal-summary {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: var(--paper-shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.cal-summary-text {
  font-size: 12px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
  line-height: 1.5;
}
.cal-summary-text b {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  font-weight: 500;
  margin: 0 3px;
  font-variant-numeric: tabular-nums;
  display: inline-block;
}
.cal-summary-dots {
  display: flex;
  gap: 4px;
}
.cal-summary-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 0 4px;
}
.cal-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
}
.cal-title em {
  font-style: normal;
  color: var(--ink-faint);
  font-size: 14px;
  margin-left: 8px;
  letter-spacing: 0.05em;
}
.cal-nav-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--surface);
  color: var(--ink-soft);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--paper-shadow);
  transition: transform 0.15s var(--ease);
}
.cal-nav-btn:active { transform: scale(0.92); }

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 6px;
  padding: 0 2px;
}
.cal-wd {
  font-size: 10px;
  color: var(--ink-faint);
  padding: 4px 0;
  letter-spacing: 0.1em;
  font-weight: 600;
}
.cal-wd.weekend { color: var(--accent); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  background: transparent;
  margin-bottom: 14px;
}
.cal-day {
  aspect-ratio: 1 / 1.05;
  background: var(--surface);
  border-radius: var(--r-sm);
  padding: 5px 4px 4px;
  position: relative;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s var(--ease), background 0.2s var(--ease);
  box-shadow: 0 1px 0 rgba(120, 95, 65, 0.03);
}
.cal-day:active { transform: scale(0.94); }
.cal-day.empty-cell {
  background: transparent;
  pointer-events: none;
  box-shadow: none;
}
.cal-day.has-entry {
  background: var(--surface-warm);
}
.cal-day.today {
  background: var(--ink);
}
.cal-day.today .cal-day-num {
  color: var(--surface);
  font-weight: 600;
}
.cal-day.selected {
  background: var(--accent-soft);
  box-shadow: 0 0 0 2px var(--accent);
}
.cal-day-num {
  font-size: 11px;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
  font-family: var(--num);
  font-weight: 500;
  line-height: 1;
  text-align: center;
}
.cal-day-num.weekend { color: var(--accent); }
.cal-day.today .cal-day-num.weekend { color: var(--surface); }

.cal-dot-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 2px;
  padding-top: 3px;
}
.cal-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}
.cal-dot.want { background: var(--s-want); }
.cal-dot.watching { background: var(--s-watching); }
.cal-dot.done { background: var(--s-done); }
.cal-dot.drop { background: var(--s-drop); }

.cal-day-count {
  position: absolute;
  top: 2px;
  right: 3px;
  font-size: 8.5px;
  color: var(--ink-faint);
  font-family: var(--num);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.cal-day.today .cal-day-count { color: rgba(255,255,255,0.7); }

/* 月曆下方詳情 */
.cal-detail {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 14px 16px 8px;
  margin-top: 6px;
  box-shadow: var(--paper-shadow);
  animation: detailIn 0.3s var(--ease);
}
@keyframes detailIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.cal-detail-head {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 10px;
  letter-spacing: 0.04em;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cal-detail-head em {
  font-style: normal;
  font-family: var(--num);
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 400;
  letter-spacing: 0;
}
.cal-entry-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--line-soft);
  min-height: 44px;
  transition: opacity 0.15s;
}
.cal-entry-mini:last-child { border-bottom: none; }
.cal-entry-mini:active { opacity: 0.6; }
.cal-mini-thumb {
  width: 28px;
  height: 36px;
  border-radius: 4px;
  flex-shrink: 0;
  background: var(--surface-tinted);
  overflow: hidden;
  position: relative;
}
.cal-mini-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.cal-mini-thumb-bar {
  position: absolute; left: 0; bottom: 0; right: 0; height: 3px;
}
.cal-mini-title {
  font-family: var(--serif);
  font-size: 13.5px;
  color: var(--ink);
  flex: 1;
  letter-spacing: 0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.cal-mini-tag {
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}

/* ════════════════════════════════════════════
   MODAL — bottom sheet
   ════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(40, 30, 22, 0.45);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 200;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s var(--ease);
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-sheet {
  background: var(--surface-warm);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform 0.32s var(--ease);
  box-shadow: 0 -10px 40px rgba(60, 40, 20, 0.18);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--ink-ghost);
  border-radius: 2px;
  margin: 10px auto 0;
}
.modal-header {
  padding: 14px 22px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--surface-warm);
  z-index: 2;
}
.modal-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.08em;
}
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface-tinted);
  color: var(--ink-soft);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s var(--ease);
}
.modal-close:active { transform: scale(0.92); }
.modal-body {
  padding: 6px 22px 32px;
}

/* ════════════════════════════════════════════
   FORM — 重新分組
   ════════════════════════════════════════════ */
.form-section {
  margin-bottom: 20px;
}
.form-group {
  margin-bottom: 18px;
}
.form-label {
  font-size: 10.5px;
  color: var(--ink-mute);
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.16em;
  font-weight: 600;
  text-transform: uppercase;
}
.form-label .req {
  color: var(--c-jp);
  font-size: 12px;
  letter-spacing: 0;
}
.form-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  color: var(--ink);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.form-input:focus {
  border-color: var(--ink-faint);
  box-shadow: 0 0 0 3px rgba(120, 95, 65, 0.08);
}
.form-input::placeholder { color: var(--ink-faint); }
textarea.form-input {
  resize: vertical;
  min-height: 88px;
  line-height: 1.6;
  font-family: var(--sans);
}
input[type="date"].form-input {
  color-scheme: light;
  min-height: 46px;
  font-family: var(--num);
  font-variant-numeric: tabular-nums;
}

/* — 類型選擇 大圖示 — */
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.type-option { position: relative; }
.type-option input[type="radio"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.type-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 12px 4px 10px;
  border-radius: var(--r);
  background: var(--surface);
  border: 1.5px solid var(--line);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  transition: all 0.18s var(--ease);
  min-height: 64px;
}
.type-label .type-emoji {
  font-size: 20px;
  line-height: 1;
  transition: transform 0.2s var(--ease-bounce);
}
.type-option input[type="radio"]:checked + .type-label .type-emoji {
  transform: scale(1.18);
}
.type-option.t-jp input:checked + .type-label { background: var(--c-jp-bg); border-color: var(--c-jp); color: var(--c-jp); }
.type-option.t-kr input:checked + .type-label { background: var(--c-kr-bg); border-color: var(--c-kr); color: var(--c-kr); }
.type-option.t-cn input:checked + .type-label { background: var(--c-cn-bg); border-color: var(--c-cn); color: var(--c-cn); }
.type-option.t-anime input:checked + .type-label { background: var(--c-anime-bg); border-color: var(--c-anime); color: var(--c-anime); }

/* — 狀態選擇 — */
.status-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.status-option { position: relative; }
.status-option input[type="radio"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.status-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 12px 8px;
  border-radius: var(--r);
  background: var(--surface);
  border: 1.5px solid var(--line);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.02em;
  transition: all 0.18s var(--ease);
  min-height: 48px;
}
.status-label .s-icon {
  font-size: 14px;
  line-height: 1;
}
.status-option.s-want input:checked + .status-label { background: var(--s-want-bg); border-color: var(--s-want); color: var(--s-want); }
.status-option.s-watching input:checked + .status-label { background: var(--s-watching-bg); border-color: var(--s-watching); color: var(--s-watching); }
.status-option.s-done input:checked + .status-label { background: var(--s-done-bg); border-color: var(--s-done); color: var(--s-done); }
.status-option.s-drop input:checked + .status-label { background: var(--s-drop-bg); border-color: var(--s-drop); color: var(--s-drop); }

/* — Stars 評分（彈跳動畫）— */
.star-picker {
  display: flex;
  gap: 4px;
  align-items: center;
  background: var(--surface);
  padding: 8px 12px;
  border-radius: var(--r);
  border: 1px solid var(--line);
}
.star-btn {
  font-size: 30px;
  color: var(--star-soft);
  padding: 4px;
  line-height: 1;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.18s var(--ease-bounce), color 0.2s var(--ease);
}
.star-btn.lit { color: var(--star); }
.star-btn:active { transform: scale(0.85); }
.star-btn.bounce { animation: starBounce 0.4s var(--ease-bounce); }
@keyframes starBounce {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.star-label {
  margin-left: auto;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.06em;
  font-family: var(--num);
  font-variant-numeric: tabular-nums;
  min-width: 30px;
  text-align: right;
}

/* — 日期 + 快捷 — */
.date-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
}
.date-row .form-input { flex: 1; }
.date-quick-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.date-quick {
  flex: 1;
  font-size: 12px;
  color: var(--ink-soft);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 7px 10px;
  letter-spacing: 0.04em;
  transition: all 0.18s var(--ease);
  min-height: 32px;
}
.date-quick.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}

/* — 進階收合區 — */
.form-collapsible {
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: var(--surface);
  margin-bottom: 18px;
  overflow: hidden;
}
.form-collapse-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  width: 100%;
  text-align: left;
  min-height: 46px;
}
.form-collapse-head .chevron {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
  transition: transform 0.25s var(--ease);
}
.form-collapsible.open .form-collapse-head .chevron { transform: rotate(180deg); }
.form-collapse-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.32s var(--ease);
}
.form-collapsible.open .form-collapse-body {
  max-height: 800px;
}
.form-collapse-inner {
  padding: 4px 16px 18px;
  border-top: 1px solid var(--line-soft);
}

/* — 封面 智慧輸入 — */
.poster-section { }
.poster-preview-wrap {
  position: relative;
  margin-bottom: 10px;
  border-radius: var(--r);
  overflow: hidden;
  background: var(--surface-tinted);
}
.poster-preview-wrap img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}
.poster-clear-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(40, 30, 22, 0.78);
  color: var(--surface);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.poster-input-row {
  display: flex;
  gap: 6px;
}
.poster-input-row .form-input { flex: 1; }
.poster-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.poster-action-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 11px 10px;
  font-size: 12.5px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-height: 42px;
}
.poster-action-btn:active { background: var(--surface-tinted); }
.poster-action-btn .icon { font-size: 14px; }
.poster-tip {
  font-size: 11.5px;
  color: var(--ink-faint);
  margin-top: 8px;
  line-height: 1.5;
  letter-spacing: 0.02em;
}

/* — 主按鈕 — */
.submit-btn {
  width: 100%;
  background: var(--ink);
  color: var(--surface);
  padding: 15px;
  font-size: 14.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  margin-top: 10px;
  min-height: 52px;
  border-radius: var(--r);
  transition: transform 0.15s var(--ease);
  box-shadow: 0 2px 0 rgba(58, 46, 38, 0.14), 0 6px 14px rgba(58, 46, 38, 0.18);
}
.submit-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(58, 46, 38, 0.14); }

.delete-btn {
  width: 100%;
  background: transparent;
  color: var(--c-jp);
  border: 1px solid rgba(212, 90, 107, 0.28);
  border-radius: var(--r);
  padding: 12px;
  font-size: 13px;
  letter-spacing: 0.06em;
  margin-top: 10px;
  min-height: 46px;
}
.delete-btn:active { background: rgba(212, 90, 107, 0.06); }

/* ════════════════════════════════════════════
   DETAIL VIEW
   ════════════════════════════════════════════ */
.detail-poster {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
  border-radius: var(--r);
  margin-bottom: 16px;
  background: var(--surface-tinted);
}
.detail-poster-ph {
  width: 100%;
  height: 140px;
  background: linear-gradient(135deg, var(--surface-tinted), var(--surface-warm));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-ghost);
  font-family: var(--serif);
  font-size: 32px;
  border-radius: var(--r);
  margin-bottom: 16px;
}
.detail-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 12px;
  letter-spacing: 0.04em;
  line-height: 1.35;
}
.detail-meta-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  align-items: center;
}
.detail-stars {
  display: flex;
  gap: 2px;
  margin-bottom: 10px;
  font-size: 22px;
}
.detail-star { color: var(--star-soft); }
.detail-star.lit { color: var(--star); }
.detail-date {
  font-size: 12px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  font-family: var(--num);
  font-variant-numeric: tabular-nums;
}
.detail-note {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.85;
  margin-top: 16px;
  padding: 14px 16px;
  background: var(--bg-tint);
  border-radius: var(--r);
  border-left: 3px solid var(--accent);
  white-space: pre-wrap;
  word-break: break-word;
}
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 22px;
}
.action-btn {
  flex: 1;
  padding: 13px;
  border-radius: var(--r);
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink);
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.action-btn.primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.action-btn:active { transform: scale(0.98); }

/* ════════════════════════════════════════════
   TOAST — 成就感提示
   ════════════════════════════════════════════ */
.toast-wrap {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  pointer-events: none;
  width: calc(100% - 32px);
  max-width: 420px;
}
.toast {
  background: var(--ink);
  color: var(--surface);
  padding: 13px 18px;
  border-radius: var(--r-pill);
  font-size: 13.5px;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 24px rgba(58, 46, 38, 0.28);
  transform: translateY(-20px) scale(0.96);
  opacity: 0;
  transition: transform 0.32s var(--ease-bounce), opacity 0.28s var(--ease);
  pointer-events: all;
  margin: 0 auto;
  width: fit-content;
  max-width: 100%;
}
.toast.show {
  transform: translateY(0) scale(1);
  opacity: 1;
}
.toast .icon {
  font-size: 16px;
  line-height: 1;
}
.toast.success { background: var(--s-done); }
.toast.warn { background: var(--s-want); }
.toast.error { background: var(--c-jp); }

/* ════════════════════════════════════════════
   CONFIRM DIALOG — 取代 confirm()
   ════════════════════════════════════════════ */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(40, 30, 22, 0.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s var(--ease);
  padding: 24px;
}
.confirm-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.confirm-box {
  background: var(--surface-warm);
  border-radius: var(--r-lg);
  padding: 22px 22px 18px;
  max-width: 320px;
  width: 100%;
  text-align: center;
  transform: scale(0.92);
  transition: transform 0.28s var(--ease-bounce);
  box-shadow: 0 16px 40px rgba(60, 40, 20, 0.2);
}
.confirm-overlay.open .confirm-box {
  transform: scale(1);
}
.confirm-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(212, 90, 107, 0.12);
  color: var(--c-jp);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
}
.confirm-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.confirm-msg {
  font-size: 13px;
  color: var(--ink-mute);
  line-height: 1.6;
  margin-bottom: 20px;
}
.confirm-actions {
  display: flex;
  gap: 8px;
}
.confirm-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--r);
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  min-height: 46px;
}
.confirm-btn.cancel {
  background: var(--surface-tinted);
  color: var(--ink-soft);
}
.confirm-btn.danger {
  background: var(--c-jp);
  color: var(--surface);
}

/* ════════════════════════════════════════════
   MISC
   ════════════════════════════════════════════ */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════ -->
<header class="app-header">
  <div class="header-top">
    <div class="app-title">
      追劇手帳
      <small>drama &amp; anime log</small>
    </div>
    <button class="add-btn" id="btn-add-main">
      <span class="plus">＋</span>新增
    </button>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab-btn active" id="tab-list" role="tab">清　單</button>
    <button class="tab-btn" id="tab-calendar" role="tab">月　曆</button>
  </div>
</header>

<main class="main">
  <!-- ════════════════════════════════════════════
       LIST VIEW
       ════════════════════════════════════════════ -->
  <div id="view-list" class="view">
    <div class="stats-bar" id="stats-bar"></div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      <input class="search-input" type="search" placeholder="搜尋劇名⋯" id="list-search" autocomplete="off">
      <button type="button" class="search-clear" id="search-clear" aria-label="清除搜尋">×</button>
    </div>

    <div class="filter-bar" id="filter-bar"></div>
    <div id="entry-list" class="entry-list"></div>
  </div>

  <!-- ════════════════════════════════════════════
       CALENDAR VIEW
       ════════════════════════════════════════════ -->
  <div id="view-calendar" class="view" style="display:none;">
    <div class="cal-summary" id="cal-summary"></div>

    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev" aria-label="上個月">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav-btn" id="cal-next" aria-label="下個月">›</button>
    </div>

    <div class="cal-weekdays">
      <div class="cal-wd weekend">日</div>
      <div class="cal-wd">一</div>
      <div class="cal-wd">二</div>
      <div class="cal-wd">三</div>
      <div class="cal-wd">四</div>
      <div class="cal-wd">五</div>
      <div class="cal-wd weekend">六</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="cal-detail-wrap"></div>
  </div>
</main>

<!-- ════════════════════════════════════════════
     EDIT MODAL
     ════════════════════════════════════════════ -->
<div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">新增追劇</div>
      <button class="modal-close" id="btn-close-edit" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <form id="entry-form">

        <!-- Section 1: 必填基本資料 -->

        <div class="form-group">
          <label class="form-label">觀看狀態 <span class="req">*</span></label>
          <div class="status-grid">

        <!-- Section 2: 進階補充 (預設收合) -->

          <div class="form-collapse-body">

              <div class="form-group">
                <label class="form-label">評分</label>
                <div class="star-picker" id="star-picker">
                  <button type="button" class="star-btn" data-v="1">★</button>
                  <button type="button" class="star-btn" data-v="2">★</button>
                  <button type="button" class="star-btn" data-v="3">★</button>
                  <button type="button" class="star-btn" data-v="4">★</button>
                  <button type="button" class="star-btn" data-v="5">★</button>
                  <span class="star-label" id="star-label">─ / 5</span>
                </div>
                <input type="hidden" id="f-stars" value="0">

              <div class="form-group">
                <label class="form-label" for="f-date">日期</label>
                <input class="form-input" type="date" id="f-date">
                <div class="date-quick-row">
                  <button type="button" class="date-quick" data-quick="0">今天</button>
                  <button type="button" class="date-quick" data-quick="-1">昨天</button>
                  <button type="button" class="date-quick" data-quick="-2">前天</button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="f-note">備註</label>
                <textarea class="form-input" id="f-note" placeholder="心得、劇情、喜歡的角色⋯"></textarea>
              </div>

              <div class="form-group poster-section">
                <label class="form-label">封面 / 劇照</label>
                <div id="poster-preview" style="display:none;" class="poster-preview-wrap">
                  <img id="poster-preview-img" src="" alt="封面預覽">
                  <button type="button" class="poster-clear-btn" id="btn-clear-poster" aria-label="移除封面">×</button>
                </div>
                <div class="poster-input-row">
                  <input class="form-input" type="url" id="f-poster-url" placeholder="貼上圖片網址⋯" autocomplete="off">
                </div>
                <div class="poster-actions">
                  <button type="button" class="poster-action-btn" id="btn-open-search">
                    <span class="icon">🔍</span>搜尋圖片
                  </button>
                  <label class="poster-action-btn" for="f-poster-file">
                    <span class="icon">📷</span>從相簿
                  </label>
                  <input type="file" id="f-poster-file" accept="image/*" style="display:none;">
                </div>
                <p class="poster-tip">貼網址會自動預覽 · 搜尋後長按圖片可複製連結</p>
                <input type="hidden" id="f-poster" value="">
              </div>

            </div>
          </div>
        </div>

        <input type="hidden" id="f-id" value="">
        <button type="submit" class="submit-btn" id="submit-btn">儲存</button>
        <button type="button" class="delete-btn" id="delete-btn" style="display:none;">刪除這筆紀錄</button>
      </form>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     DETAIL MODAL
     ════════════════════════════════════════════ -->
<div class="modal-overlay" id="detail-modal" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">紀錄詳情</div>
      <button class="modal-close" id="btn-close-detail" aria-label="關閉">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     CONFIRM DIALOG
     ════════════════════════════════════════════ -->
<div class="confirm-overlay" id="confirm-overlay" role="dialog" aria-modal="true">
  <div class="confirm-box">
    <div class="confirm-icon">⚠</div>
    <div class="confirm-title" id="confirm-title">確定刪除？</div>
    <div class="confirm-msg" id="confirm-msg">刪除後無法復原這筆紀錄</div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" id="confirm-cancel">取消</button>
      <button class="confirm-btn danger" id="confirm-ok">刪除</button>
    </div>
  </div>
</div>

<!-- toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
var store = (function(){
  var mem = {};
  try {
    localStorage.setItem('_t', '1');
    localStorage.removeItem('_t');
    return localStorage;
  } catch(e) {
    return {
      getItem: function(k){ return mem[k] || null; },
      setItem: function(k, v){ mem[k] = v; },
      removeItem: function(k){ delete mem[k]; }
    };
  }
})();

// ════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════
var TYPE_MAP = { jp: '日劇', kr: '韓劇', cn: '古裝', anime: '動漫' };
var TYPE_EMOJI = { jp: '🌸', kr: '🌊', cn: '🏯', anime: '✨' };
var STATUS_MAP = { want: '待看', watching: '觀看中', done: '已看完', drop: '棄劇' };
var STATUS_ICON = { want: '📌', watching: '▶', done: '✓', drop: '✕' };

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
var entries = [];
try { entries = JSON.parse(store.getItem('drama-entries') || '[]'); }
catch(e) { entries = []; }

var currentTab = 'list';
var calYear, calMonth;
var activeFilter = 'all';
var activeStatus = 'all';
var editingId = null;
var formStars = 0;
var selectedPoster = '';
var selectedCalDay = null;
var urlDebounce = null;
var toastTimer = null;
var pendingConfirm = null;

var today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function $(id) { return document.getElementById(id); }
function save() { try { store.setItem('drama-entries', JSON.stringify(entries)); } catch(e){} }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function pad(n) { return n < 10 ? '0' + n : String(n); }
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function offsetDateStr(offsetDays) {
  var d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[0] + '.' + p[1] + '.' + p[2];
}
function fmtDateLong(d) {
  if (!d) return '';
  var p = d.split('-');
  var date = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
  var wd = ['日','一','二','三','四','五','六'][date.getDay()];
  return p[0] + '年 ' + parseInt(p[1]) + '月 ' + parseInt(p[2]) + '日 · 星期' + wd;
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg, type) {
  type = type || 'success';
  var wrap = $('toast-wrap');
  var t = document.createElement('div');
  var icon = type === 'success' ? '✓' : type === 'warn' ? '!' : '×';
  t.className = 'toast ' + type;
  t.innerHTML = '<span class="icon">' + icon + '</span><span>' + esc(msg) + '</span>';
  wrap.innerHTML = '';
  wrap.appendChild(t);
  // trigger reflow
  void t.offsetHeight;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){
    t.classList.remove('show');
    setTimeout(function(){ if (t.parentNode) t.parentNode.removeChild(t); }, 320);
  }, 2200);
}

// ════════════════════════════════════════════
// CONFIRM DIALOG
// ════════════════════════════════════════════
function showConfirm(opts, onOK) {
  $('confirm-title').textContent = opts.title || '確定？';
  $('confirm-msg').textContent = opts.msg || '';
  pendingConfirm = onOK;
  $('confirm-overlay').classList.add('open');
}
function hideConfirm() {
  $('confirm-overlay').classList.remove('open');
  pendingConfirm = null;
}

// ════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════
function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  $('tab-list').classList.toggle('active', tab === 'list');
  $('tab-calendar').classList.toggle('active', tab === 'calendar');

  var listV = $('view-list');
  var calV = $('view-calendar');

  if (tab === 'calendar') {
    listV.style.display = 'none';
    calV.style.display = '';
    calV.style.animation = 'none';
    void calV.offsetHeight;
    calV.style.animation = '';
    renderCalendar();
  } else {
    calV.style.display = 'none';
    listV.style.display = '';
    listV.style.animation = 'none';
    void listV.offsetHeight;
    listV.style.animation = '';
    renderStats();
    renderFilters();
    renderList();
  }
}

// ════════════════════════════════════════════
// STATS — 數字 count-up
// ════════════════════════════════════════════
function renderStats() {
  var c = { want: 0, watching: 0, done: 0, drop: 0 };
  entries.forEach(function(e){ if (c[e.status] !== undefined) c[e.status]++; });

  var html = '';
  var defs = [
    { k: 'want', label: '待看', cls: 's-want' },
    { k: 'watching', label: '觀看中', cls: 's-watching' },
    { k: 'done', label: '已看完', cls: 's-done' },
    { k: 'drop', label: '棄劇', cls: 's-drop' }
  ];
  defs.forEach(function(d){
    html += '<div class="stat-cell ' + d.cls + '">'
         +    '<div class="stat-num" data-target="' + c[d.k] + '">0</div>'
         +    '<div class="stat-lbl">' + d.label + '</div>'
         +  '</div>';
  });
  $('stats-bar').innerHTML = html;

  // count-up animation
  var nums = $('stats-bar').querySelectorAll('.stat-num');
  nums.forEach(function(el){
    var target = parseInt(el.getAttribute('data-target')) || 0;
    if (target === 0) { el.textContent = '0'; return; }
    var start = 0;
    var dur = 480;
    var t0 = performance.now();
    function step(now) {
      var p = Math.min(1, (now - t0) / dur);
      // ease-out cubic
      var eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(start + (target - start) * eased);
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

// ════════════════════════════════════════════
// FILTER
// ════════════════════════════════════════════
function renderFilters() {
  var types = [
    { k: 'all', l: '全部' },
    { k: 'jp', l: '日劇', dot: 'var(--c-jp)' },
    { k: 'kr', l: '韓劇', dot: 'var(--c-kr)' },
    { k: 'cn', l: '古裝', dot: 'var(--c-cn)' },
    { k: 'anime', l: '動漫', dot: 'var(--c-anime)' }
  ];
  var statuses = [
    { k: 'all', l: '全部狀態' },
    { k: 'want', l: '待看', dot: 'var(--s-want)' },
    { k: 'watching', l: '觀看中', dot: 'var(--s-watching)' },
    { k: 'done', l: '已看完', dot: 'var(--s-done)' },
    { k: 'drop', l: '棄劇', dot: 'var(--s-drop)' }
  ];
  var html = '';
  types.forEach(function(t){
    var dot = t.dot ? '<span class="chip-dot" style="background:' + t.dot + '"></span>' : '';
    html += '<button class="filter-chip' + (activeFilter === t.k ? ' active' : '') + '" data-fkind="type" data-ftype="' + t.k + '">' + dot + t.l + '</button>';
  });
  html += '<div class="filter-divider"></div>';
  statuses.forEach(function(s){
    var dot = s.dot ? '<span class="chip-dot" style="background:' + s.dot + '"></span>' : '';
    html += '<button class="filter-chip' + (activeStatus === s.k ? ' active' : '') + '" data-fkind="status" data-ftype="' + s.k + '">' + dot + s.l + '</button>';
  });
  $('filter-bar').innerHTML = html;
}

// ════════════════════════════════════════════
// LIST
// ════════════════════════════════════════════
function renderList() {
  var q = ($('list-search').value || '').trim().toLowerCase();
  $('search-clear').classList.toggle('show', q.length > 0);

  var filtered = entries.filter(function(e){
    if (activeFilter !== 'all' && e.type !== activeFilter) return false;
    if (activeStatus !== 'all' && e.status !== activeStatus) return false;
    if (q && (e.title || '').toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  filtered.sort(function(a, b){
    var da = a.date || '0000-00-00', db = b.date || '0000-00-00';
    return db < da ? -1 : db > da ? 1 : 0;
  });

  var el = $('entry-list');
  if (!filtered.length) {
    var isFiltered = entries.length > 0;
    el.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-illu">' +
          '<svg viewBox="0 0 96 96" fill="none">' +
            '<rect x="14" y="20" width="68" height="56" rx="6" fill="var(--surface-tinted)" stroke="var(--ink-ghost)" stroke-width="1.5"/>' +
            '<rect x="22" y="28" width="22" height="32" rx="2" fill="var(--surface-warm)" stroke="var(--ink-ghost)" stroke-width="1"/>' +
            '<line x1="50" y1="32" x2="74" y2="32" stroke="var(--ink-ghost)" stroke-width="1.5" stroke-linecap="round"/>' +
            '<line x1="50" y1="40" x2="68" y2="40" stroke="var(--ink-ghost)" stroke-width="1.5" stroke-linecap="round"/>' +
            '<line x1="50" y1="48" x2="72" y2="48" stroke="var(--ink-ghost)" stroke-width="1.5" stroke-linecap="round"/>' +
            '<circle cx="68" cy="64" r="8" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>' +
            '<path d="M65 64l2.5 2.5L72 62" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
        '</div>' +
        '<div class="empty-title">' + (isFiltered ? '找不到符合的紀錄' : '還沒有追劇紀錄') + '</div>' +
        '<div class="empty-sub">' + (isFiltered ? '試試別的篩選條件' : '從你的第一部劇開始記錄吧 ◡̈') + '</div>' +
        (isFiltered ? '' : '<button class="empty-cta" id="empty-add"><span style="font-size:14px;">＋</span>新增第一筆</button>') +
      '</div>';
    var emptyAdd = $('empty-add');
    if (emptyAdd) emptyAdd.addEventListener('click', openAddModal);
    return;
  }

  el.innerHTML = filtered.map(function(e, idx){
    var stars = '';
    for (var i = 0; i < 5; i++) {
      stars += '<span class="s' + (i < (e.stars || 0) ? ' lit' : '') + '">★</span>';
    }
    var posterHTML;
    if (e.poster) {
      posterHTML = '<img src="' + esc(e.poster) + '" alt="" onerror="this.style.display=\'none\';this.parentNode.querySelector(\'.card-poster-ph\').style.display=\'flex\';">' +
                   '<div class="card-poster-ph" style="display:none;">' + (TYPE_EMOJI[e.type] || '◯') + '</div>';
    } else {
      posterHTML = '<div class="card-poster-ph">' + (TYPE_EMOJI[e.type] || '◯') + '</div>';
    }
    return '<article class="entry-card" data-id="' + e.id + '" style="animation-delay:' + Math.min(idx * 28, 320) + 'ms;">' +
             '<div class="card-layout">' +
               '<div class="card-poster">' + posterHTML + '</div>' +
               '<div class="card-body">' +
                 '<div class="card-row1">' +
                   '<h3 class="card-title">' + esc(e.title) + '</h3>' +
                   '<span class="card-status-pill ' + e.status + '">' + STATUS_ICON[e.status] + ' ' + STATUS_MAP[e.status] + '</span>' +
                 '</div>' +
                 '<div class="card-row2">' +
                   '<span class="card-tag ' + e.type + '">' + TYPE_MAP[e.type] + '</span>' +
                   ((e.stars || 0) > 0 ? '<span class="card-stars">' + stars + '</span>' : '') +
                   (e.date ? '<span class="card-date">' + fmtDate(e.date) + '</span>' : '') +
                 '</div>' +
                 (e.note ? '<div class="card-note">' + esc(e.note) + '</div>' : '') +
               '</div>' +
             '</div>' +
           '</article>';
  }).join('');
}

// ════════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════════
function renderCalendar() {
  var months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var monthsEn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  $('cal-title').innerHTML = calYear + ' <span style="margin:0 4px;color:var(--ink-faint);">·</span> ' + months[calMonth] + ' <em>' + monthsEn[calMonth] + '</em>';

  var first = new Date(calYear, calMonth, 1).getDay();
  var days = new Date(calYear, calMonth + 1, 0).getDate();
  var todayKey = todayStr();
  var byDate = {};
  var prefix = calYear + '-' + pad(calMonth + 1);
  var monthEntries = entries.filter(function(e){
    return e.date && e.date.indexOf(prefix) === 0;
  });
  monthEntries.forEach(function(e){
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  // Summary
  var statusCount = { want: 0, watching: 0, done: 0, drop: 0 };
  monthEntries.forEach(function(e){ if (statusCount[e.status] !== undefined) statusCount[e.status]++; });
  var summaryDots = '';
  ['want','watching','done','drop'].forEach(function(k){
    if (statusCount[k] > 0) {
      summaryDots += '<span class="cal-summary-dot" style="background:var(--s-' + k + ')" title="' + STATUS_MAP[k] + ' ' + statusCount[k] + '"></span>';
    }
  });
  $('cal-summary').innerHTML =
    '<div class="cal-summary-text">本月共記錄了 <b>' + monthEntries.length + '</b> 部</div>' +
    '<div class="cal-summary-dots">' + summaryDots + '</div>';

  // Grid
  var html = '';
  for (var i = 0; i < first; i++) html += '<div class="cal-day empty-cell"></div>';
  for (var d = 1; d <= days; d++) {
    var key = calYear + '-' + pad(calMonth + 1) + '-' + pad(d);
    var de = byDate[key] || [];
    var isToday = key === todayKey;
    var isWeekend = ((first + d - 1) % 7 === 0) || ((first + d - 1) % 7 === 6);
    var isSelected = key === selectedCalDay;
    // 最多顯示 4 個 dots
    var visible = de.slice(0, 4);
    var dots = visible.map(function(e){
      return '<div class="cal-dot ' + e.status + '"></div>';
    }).join('');
    var countBadge = de.length > 4 ? '<div class="cal-day-count">+' + (de.length - 4) + '</div>' : '';

    var classes = 'cal-day';
    if (isToday) classes += ' today';
    if (de.length) classes += ' has-entry';
    if (isSelected) classes += ' selected';

    html += '<div class="' + classes + '" data-calday="' + key + '">' +
              '<div class="cal-day-num' + (isWeekend ? ' weekend' : '') + '">' + d + '</div>' +
              '<div class="cal-dot-wrap">' + dots + '</div>' +
              countBadge +
            '</div>';
  }
  $('cal-grid').innerHTML = html;

  // 維持選中日的詳情
  if (selectedCalDay && byDate[selectedCalDay]) {
    showCalDay(selectedCalDay);
  } else {
    $('cal-detail-wrap').innerHTML = '';
    selectedCalDay = null;
  }
}

function showCalDay(dateKey) {
  var de = entries.filter(function(e){ return e.date === dateKey; });
  var wrap = $('cal-detail-wrap');

  // toggle selected state
  document.querySelectorAll('.cal-day').forEach(function(el){
    el.classList.toggle('selected', el.getAttribute('data-calday') === dateKey);
  });

  if (!de.length) {
    wrap.innerHTML = '';
    selectedCalDay = null;
    return;
  }
  selectedCalDay = dateKey;

  wrap.innerHTML =
    '<div class="cal-detail">' +
      '<div class="cal-detail-head">' +
        '<span>' + fmtDateLong(dateKey) + '</span>' +
        '<em>' + de.length + ' 筆</em>' +
      '</div>' +
      de.map(function(e){
        var thumbInner;
        if (e.poster) {
          thumbInner = '<img src="' + esc(e.poster) + '" alt="" onerror="this.style.display=\'none\'">';
        } else {
          thumbInner = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink-ghost);">' + (TYPE_EMOJI[e.type] || '◯') + '</div>';
        }
        return '<div class="cal-entry-mini" data-id="' + e.id + '">' +
                 '<div class="cal-mini-thumb">' +
                   thumbInner +
                   '<div class="cal-mini-thumb-bar" style="background:var(--s-' + e.status + ')"></div>' +
                 '</div>' +
                 '<div class="cal-mini-title">' + esc(e.title) + '</div>' +
                 '<div class="cal-mini-tag">' + TYPE_MAP[e.type] + '</div>' +
               '</div>';
      }).join('') +
    '</div>';
}

// ════════════════════════════════════════════
// DETAIL MODAL
// ════════════════════════════════════════════
function openDetail(id) {
  var e = null;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) { e = entries[i]; break; }
  }
  if (!e) return;

  var stars = '';
  for (var i = 0; i < 5; i++) {
    stars += '<span class="detail-star' + (i < (e.stars || 0) ? ' lit' : '') + '">' + (i < (e.stars || 0) ? '★' : '☆') + '</span>';
  }

  var posterHTML = e.poster
    ? '<img class="detail-poster" src="' + esc(e.poster) + '" alt="" onerror="this.outerHTML=\'<div class=&quot;detail-poster-ph&quot;>' + (TYPE_EMOJI[e.type] || '◯') + '</div>\'">'
    : '<div class="detail-poster-ph">' + (TYPE_EMOJI[e.type] || '◯') + '</div>';

  $('detail-body').innerHTML =
    posterHTML +
    '<h2 class="detail-title">' + esc(e.title) + '</h2>' +
    '<div class="detail-meta-row">' +
      '<span class="card-tag ' + e.type + '">' + TYPE_MAP[e.type] + '</span>' +
      '<span class="card-status-pill ' + e.status + '">' + STATUS_ICON[e.status] + ' ' + STATUS_MAP[e.status] + '</span>' +
    '</div>' +
    ((e.stars || 0) > 0 ? '<div class="detail-stars">' + stars + '</div>' : '') +
    (e.date ? '<div class="detail-date">📅 ' + fmtDateLong(e.date) + '</div>' : '') +
    (e.note ? '<div class="detail-note">' + esc(e.note) + '</div>' : '') +
    '<div class="action-row">' +
      '<button class="action-btn" data-edit-id="' + e.id + '">✎ 編輯</button>' +
      '<button class="action-btn primary" id="btn-detail-close2">完成</button>' +
    '</div>';
  $('detail-modal').classList.add('open');
}

// ════════════════════════════════════════════
// ADD/EDIT MODAL
// ════════════════════════════════════════════
function openAddModal() {
  editingId = null;
  formStars = 0;
  selectedPoster = '';
  $('modal-title').textContent = '新增追劇';
  $('entry-form').reset();
  $('f-id').value = '';
  $('f-stars').value = '0';
  $('f-poster').value = '';
  $('f-date').value = todayStr();
  $('delete-btn').style.display = 'none';
  $('submit-btn').textContent = '儲存';
  $('poster-preview').style.display = 'none';
  $('f-poster-url').value = '';
  $('advanced-section').classList.remove('open');
  updateStarUI(0);
  updateDateQuickActive();
  $('edit-modal').classList.add('open');
  setTimeout(function(){ $('f-title').focus(); }, 320);
}

function openEditModal(id) {
  var e = null;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) { e = entries[i]; break; }
  }
  if (!e) return;

  editingId = id;
  formStars = e.stars || 0;
  selectedPoster = e.poster || '';
  $('modal-title').textContent = '編輯紀錄';
  $('f-title').value = e.title || '';
  $('f-note').value = e.note || '';
  $('f-date').value = e.date || '';
  $('f-stars').value = e.stars || 0;
  $('f-poster').value = e.poster || '';
  $('f-id').value = id;
  $('delete-btn').style.display = 'block';
  $('submit-btn').textContent = '更新';
  $('f-poster-url').value = '';

  document.querySelectorAll('input[name="f-type"]').forEach(function(r){ r.checked = r.value === e.type; });
  document.querySelectorAll('input[name="f-status"]').forEach(function(r){ r.checked = r.value === e.status; });

  if (e.poster) {
    $('poster-preview-img').src = e.poster;
    $('poster-preview').style.display = 'block';
  } else {
    $('poster-preview').style.display = 'none';
  }

  // 編輯模式下，若有評分/日期/備註/封面，自動展開進階區
  var hasAdvanced = (e.stars > 0) || e.date || e.note || e.poster;
  $('advanced-section').classList.toggle('open', !!hasAdvanced);

  updateStarUI(formStars);
  updateDateQuickActive();
  $('edit-modal').classList.add('open');
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(function(m){ m.classList.remove('open'); });
}

function updateStarUI(n) {
  document.querySelectorAll('.star-btn').forEach(function(b, i){
    b.classList.toggle('lit', i < n);
  });
  $('star-label').textContent = n > 0 ? n + ' / 5' : '─ / 5';
}

function updateDateQuickActive() {
  var v = $('f-date').value;
  document.querySelectorAll('.date-quick').forEach(function(b){
    var off = parseInt(b.getAttribute('data-quick'));
    b.classList.toggle('active', v === offsetDateStr(off));
  });
}

function saveEntry() {
  var title = $('f-title').value.trim();
  var typeEl = document.querySelector('input[name="f-type"]:checked');
  var statusEl = document.querySelector('input[name="f-status"]:checked');

  if (!title) {
    showToast('請輸入劇名', 'warn');
    $('f-title').focus();
    return;
  }
  if (!typeEl) {
    showToast('請選擇類型', 'warn');
    return;
  }
  if (!statusEl) {
    showToast('請選擇觀看狀態', 'warn');
    return;
  }

  var type = typeEl.value;
  var status = statusEl.value;
  var stars = parseInt($('f-stars').value) || 0;
  var date = $('f-date').value;
  var note = $('f-note').value.trim();
  var poster = $('f-poster').value;
  var id = $('f-id').value;
  var isNew = !id;

  if (id) {
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].id === id) {
        entries[i] = { id: id, title: title, type: type, status: status, stars: stars, date: date, note: note, poster: poster };
        break;
      }
    }
  } else {
    var newId = Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    entries.push({ id: newId, title: title, type: type, status: status, stars: stars, date: date, note: note, poster: poster });
  }
  save();
  closeModals();
  renderStats();
  renderFilters();
  renderList();
  if (currentTab === 'calendar') renderCalendar();

  showToast(isNew ? '已新增「' + title + '」 ◡̈' : '已更新紀錄', 'success');
}

function deleteEntry() {
  if (!editingId) return;
  showConfirm({
    title: '確定要刪除這筆紀錄？',
    msg: '刪除後無法復原'
  }, function(){
    entries = entries.filter(function(x){ return x.id !== editingId; });
    save();
    closeModals();
    renderStats();
    renderFilters();
    renderList();
    if (currentTab === 'calendar') renderCalendar();
    showToast('已刪除', 'success');
  });
}

// ════════════════════════════════════════════
// EVENT WIRING
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {

  // header
  $('btn-add-main').addEventListener('click', openAddModal);
  $('tab-list').addEventListener('click', function(){ switchTab('list'); });
  $('tab-calendar').addEventListener('click', function(){ switchTab('calendar'); });

  // calendar nav
  $('cal-prev').addEventListener('click', function(){
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    selectedCalDay = null;
    renderCalendar();
  });
  $('cal-next').addEventListener('click', function(){
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    selectedCalDay = null;
    renderCalendar();
  });

  // calendar grid
  $('cal-grid').addEventListener('click', function(ev){
    var day = ev.target.closest('.cal-day');
    if (day && day.getAttribute('data-calday')) {
      showCalDay(day.getAttribute('data-calday'));
    }
  });

  // calendar detail
  $('cal-detail-wrap').addEventListener('click', function(ev){
    var mini = ev.target.closest('.cal-entry-mini');
    if (mini && mini.getAttribute('data-id')) openDetail(mini.getAttribute('data-id'));
  });

  // filter bar
  $('filter-bar').addEventListener('click', function(ev){
    var chip = ev.target.closest('.filter-chip');
    if (!chip) return;
    if (chip.getAttribute('data-fkind') === 'type') activeFilter = chip.getAttribute('data-ftype');
    else activeStatus = chip.getAttribute('data-ftype');
    renderFilters();
    renderList();
  });

  // entry list
  $('entry-list').addEventListener('click', function(ev){
    var card = ev.target.closest('.entry-card');
    if (card && card.getAttribute('data-id')) openDetail(card.getAttribute('data-id'));
  });

  // search
  $('list-search').addEventListener('input', renderList);
  $('search-clear').addEventListener('click', function(){
    $('list-search').value = '';
    renderList();
    $('list-search').focus();
  });

  // close modal buttons
  $('btn-close-edit').addEventListener('click', closeModals);
  $('btn-close-detail').addEventListener('click', closeModals);

  // overlay click to close
  document.querySelectorAll('.modal-overlay').forEach(function(overlay){
    overlay.addEventListener('click', function(ev){
      if (ev.target === overlay) closeModals();
    });
  });

  // detail body delegation
  $('detail-body').addEventListener('click', function(ev){
    var editBtn = ev.target.closest('[data-edit-id]');
    if (editBtn) {
      closeModals();
      setTimeout(function(){ openEditModal(editBtn.getAttribute('data-edit-id')); }, 280);
      return;
    }
    if (ev.target.id === 'btn-detail-close2') closeModals();
  });

  // ── star picker with bounce ──
  $('star-picker').addEventListener('click', function(ev){
    var btn = ev.target.closest('.star-btn');
    if (!btn) return;
    var v = parseInt(btn.getAttribute('data-v'));
    formStars = v;
    $('f-stars').value = v;
    updateStarUI(v);
    // bounce animation
    document.querySelectorAll('.star-btn').forEach(function(b, i){
      b.classList.remove('bounce');
      if (i < v) {
        setTimeout(function(){
          b.classList.add('bounce');
          setTimeout(function(){ b.classList.remove('bounce'); }, 400);
        }, i * 40);
      }
    });
    // haptic
    if (navigator.vibrate) navigator.vibrate(8);
  });

  // form submit
  $('entry-form').addEventListener('submit', function(ev){
    ev.preventDefault();
    saveEntry();
  });

  // delete
  $('delete-btn').addEventListener('click', deleteEntry);

  // ── advanced section toggle ──
  $('advanced-toggle').addEventListener('click', function(){
    $('advanced-section').classList.toggle('open');
  });

  // ── date quick buttons ──
  document.querySelectorAll('.date-quick').forEach(function(btn){
    btn.addEventListener('click', function(){
      var off = parseInt(btn.getAttribute('data-quick'));
      $('f-date').value = offsetDateStr(off);
      updateDateQuickActive();
    });
  });
  $('f-date').addEventListener('change', updateDateQuickActive);

  // ── poster: search ──
  $('btn-open-search').addEventListener('click', function(){
    var title = $('f-title').value.trim();
    var q = title || '劇照';
    window.open('https://www.google.com/search?q=' + encodeURIComponent(q + ' poster') + '&tbm=isch', '_blank');
  });

  // ── poster: URL with auto-preview ──
  $('f-poster-url').addEventListener('input', function(){
    clearTimeout(urlDebounce);
    var val = this.value.trim();
    if (!val || !/^https?:\/\//i.test(val)) {
      $('poster-preview').style.display = 'none';
      return;
    }
    urlDebounce = setTimeout(function(){
      var img = new Image();
      img.onload = function(){
        $('f-poster').value = val;
        selectedPoster = val;
        $('poster-preview-img').src = val;
        $('poster-preview').style.display = 'block';
      };
      img.onerror = function(){
        $('poster-preview').style.display = 'none';
      };
      img.src = val;
    }, 600);
  });

  // ── poster: file upload ──
  $('f-poster-file').addEventListener('change', function(){
    var file = this.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('圖片過大（上限 5MB）', 'warn');
      this.value = '';
      return;
    }
    var reader = new FileReader();
    reader.onload = function(ev){
      $('f-poster').value = ev.target.result;
      selectedPoster = ev.target.result;
      $('poster-preview-img').src = ev.target.result;
      $('poster-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  // ── poster: clear ──
  $('btn-clear-poster').addEventListener('click', function(){
    $('f-poster').value = '';
    selectedPoster = '';
    $('poster-preview').style.display = 'none';
    $('poster-preview-img').src = '';
    $('f-poster-url').value = '';
    $('f-poster-file').value = '';
  });

  // ── confirm dialog ──
  $('confirm-cancel').addEventListener('click', hideConfirm);
  $('confirm-overlay').addEventListener('click', function(ev){
    if (ev.target === this) hideConfirm();
  });
  $('confirm-ok').addEventListener('click', function(){
    var fn = pendingConfirm;
    hideConfirm();
    if (fn) fn();
  });

  // ── ESC key ──
  document.addEventListener('keydown', function(ev){
    if (ev.key === 'Escape') {
      if ($('confirm-overlay').classList.contains('open')) hideConfirm();
      else closeModals();
    }
  });

  // ── init ──
  renderStats();
  renderFilters();
  renderList();
});
</script>
</body>
</html>
